# /etc/netplan/00-installer-config.yaml
# Static IP configuration for Syslog Relay Server

network:
  ethernets:
    ens3:
      addresses:
        - 192.168.99.10/24
      routes:
        - to: default
          via: 192.168.99.1
      nameservers:
        addresses:
          - 8.8.8.8
  version: 2
  
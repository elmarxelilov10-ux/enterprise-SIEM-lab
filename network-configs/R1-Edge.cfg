! ==========================================================
! Device: R1-Edge (DELTA_TELECOM)
! Role: Edge Router, eBGP Peering, NTP Master, Dual Syslog
! ==========================================================

hostname DELTA_TELECOM

! --- Security ---
enable secret 5 <HIDDEN_HASH>
no aaa new-model

! --- Global Logging & Timestamps ---
service timestamps debug datetime msec localtime show-timezone
service timestamps log datetime msec localtime show-timezone
logging source-interface Loopback0
logging host 192.168.99.10
logging host 192.168.55.10
ntp master 3

! --- Interfaces ---
interface Loopback0
 ip address 10.10.10.1 255.255.255.255

interface Ethernet0/0
 description eBGP Link 1
 ip address 31.171.111.17 255.255.255.252
 duplex auto

interface Ethernet0/1
 description eBGP Link 2
 ip address 31.171.111.21 255.255.255.252
 duplex auto

interface Ethernet0/2
 description Dynamic Upstream Link
 ip address dhcp
 duplex auto

! --- BGP Routing ---
router bgp 100
 bgp log-neighbor-changes
 neighbor 31.171.111.18 remote-as 65001
 neighbor 31.171.111.18 default-originate
 neighbor 31.171.111.22 remote-as 65001
 neighbor 31.171.111.22 default-originate

! --- Console Management ---
line con 0
 logging synchronous